{% extends 'base.html' %}

{% block content %}
<section class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-6 col-xl-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 text-center mb-3">Iniciar Sesi&oacute;n</h1>

          <form action="{% url 'login' %}" method="post" id="form-login">
            {% csrf_token %}
            <div class="row g-3">
              <div class="col-12">
                <label for="username" class="form-label">Usuario o Email <span class="text-danger">*</span></label>
                <input name="username" id="username" type="text" class="form-control" required>
              </div>
              <div class="col-12">
                <label for="password" class="form-label">Contrase&ntilde;a <span class="text-danger">*</span></label>
                <input name="password" id="password" type="password" class="form-control" required>
              </div>
              <div class="col-12 d-grid">
                <button class="btn btn-primary btn-lg" type="submit">Entrar</button>
              </div>
            </div>
          </form>

          <p class="text-center text-muted mt-3 mb-0">
            &iquest;No tienes cuenta?
            <a href="{% url 'register' %}">Reg&iacute;strate</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
