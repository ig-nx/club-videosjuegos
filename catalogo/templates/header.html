{% load static %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-dark-subtle py-3">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2 fs-4" href="{% url 'index' %}">
      <img
        src="{% static 'img/ps_v3.webp' %}"
        alt="Club VJ"
        width="38"
        height="38"
        loading="lazy"
        class="brand-logo"
      >
      <span class="fw-semibold">Club VJ</span>
    </a>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarMain"
      aria-controls="navbarMain"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'index' %}">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'videojuegos' %}">Videojuegos</a>
        </li>
      </ul>

      <div class="d-flex align-items-center gap-2">
        {% if user.is_authenticated %}
        <span class="text-warning">Hola, {{ user.first_name|default:user.username }}</span>
        <form action="{% url 'logout' %}" method="post" class="d-inline">
          {% csrf_token %}
          <button class="btn btn-outline-danger btn-sm" type="submit">Salir</button>
        </form>
        {% else %}
        <a href="{% url 'login' %}" class="btn btn-outline-primary btn-sm">Login</a>
        <a href="{% url 'register' %}" class="btn btn-outline-success btn-sm">Registro</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>
